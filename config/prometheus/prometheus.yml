global:
  scrape_interval: 5s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'telemetry_api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'telemetry_processor'
    static_configs:
      - targets: ['processor:8001']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
