groups:
  - name: telemetry_alerts
    rules:
      - alert: HighApiLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High API Latency on {{ $labels.instance }}"

      - alert: KafkaConsumerLagSpike
        expr: kafka_consumer_lag > 5000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Kafka Lag detected"
          
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
